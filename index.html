<!DOCTYPE html>        
<html lang="pt-br">        
<head>        
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">        
<title>SHADOW SYSTEM | MONARCA 5.4</title>        
<style>        
:root{--bg:#010409;--p:rgba(5,12,25,0.9);--a:#00e5ff;--shadow:#002244;--t:#e6f0ff;--b:rgba(0,229,255,0.3)}        
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;transition:0.2s}        
body{background:var(--bg);color:var(--t);margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:80px;overflow-x:hidden}        
.setup-overlay{position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{background:var(--p);border:1px solid var(--a);padding:25px;width:100%;max-width:400px;text-align:center}
.arch-opt{border:1px solid var(--b);padding:10px;margin:5px;cursor:pointer;font-size:10px;display:inline-block;width:45%}
.arch-opt.selected{border-color:var(--a);background:rgba(0,229,255,0.1)}
input{width:100%;padding:10px;margin:5px 0;background:rgba(0,0,0,0.6);border:1px solid var(--b);color:var(--a);text-align:center}
.container{width:100%;max-width:450px;padding:15px}        
.panel{background:var(--p);border:1px solid var(--b);padding:15px;margin-bottom:15px;border-radius:4px}        
.day-ui{font-size:9px;color:var(--a);letter-spacing:2px;font-weight:bold;border:1px solid var(--b);padding:4px;display:inline-block;margin-bottom:10px}
.stat-label{font-size:9px;color:#888;text-transform:uppercase;display:block}
.stat-val{font-size:28px;font-weight:900}
.bar-w{width:100%;height:6px;background:#000;margin:8px 0;border-radius:3px;overflow:hidden;border:1px solid #111}        
.bar-f{height:100%;background:linear-gradient(90deg,var(--shadow),var(--a));width:0%}        
.trinity-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px}
.trinity-card{background:rgba(5,12,25,0.8);border:1px solid var(--b);padding:10px;text-align:center;border-bottom:2px solid var(--a)}
.mission-item{background:rgba(0,0,0,0.4);border:1px solid var(--b);padding:12px;margin-bottom:8px;border-left:3px solid var(--a);cursor:pointer}
.mission-item.done{opacity:0.3;filter:grayscale(1);pointer-events:none}
.m-type{font-size:8px;font-weight:900;color:var(--a);display:block}
.btn-reroll{width:100%;padding:10px;background:rgba(255,0,0,0.05);border:1px solid rgba(255,0,0,0.3);color:#ff4444;font-size:10px;font-weight:bold;letter-spacing:1px;cursor:pointer;margin-top:10px;border-radius:4px}
.water-btn{background:rgba(0,229,255,0.05);border:1px solid var(--a);color:var(--a);padding:10px;flex:1;font-size:9px;font-weight:bold;cursor:pointer;border-radius:4px}
.nav{position:fixed;bottom:0;width:100%;max-width:450px;background:#010306;border-top:1px solid var(--b);display:grid;grid-template-columns:1fr 1fr;height:60px}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:#444;text-transform:uppercase}
.nav-btn.active{color:var(--a);border-top:2px solid var(--a)}
.hidden{display:none!important}
#alert-box{position:fixed;top:10px;background:#ff0000;color:#fff;padding:10px;font-weight:bold;z-index:2000;display:none;font-size:10px;width:90%;text-align:center;box-shadow:0 0 15px #ff0000}
.timer-display{font-size:48px;font-weight:900;color:var(--a);margin:10px 0;text-shadow:0 0 10px var(--shadow)}
.timer-btn{background:none;border:1px solid var(--a);color:var(--a);padding:5px 15px;font-size:10px;cursor:pointer;margin:2px}
.timer-in{width:50px!important;padding:5px!important;margin:0 2px!important;display:inline-block!important;font-size:12px}
.w-tab{flex:1;padding:10px;background:rgba(0,0,0,0.5);border:1px solid var(--b);text-align:center;font-size:9px;cursor:pointer}
.w-tab.active{border-color:var(--a);color:var(--a)}
.w-table{width:100%;border-collapse:collapse}
.w-table input{padding:5px;font-size:11px;background:transparent;border:none;border-bottom:1px solid #222;color:#fff}
</style>
</head>
<body>

<div id="alert-box">AVISO DO SISTEMA</div>

<div id="setup-screen" class="setup-overlay hidden">
    <div class="setup-card">
        <h2 style="color:var(--a);margin:0;">SISTEMA MONARCA</h2>
        <div id="arch-box">
            <div class="arch-opt" onclick="Sys.selArch('viking',this)">VIKING</div>
            <div class="arch-opt" onclick="Sys.selArch('samurai',this)">SAMURAI</div>
            <div class="arch-opt" onclick="Sys.selArch('templario',this)">TEMPLÁRIO</div>
            <div class="arch-opt" onclick="Sys.selArch('soldado',this)">SOLDADO</div>
        </div>
        <input type="text" id="setup-name" placeholder="CODINOME">
        <input type="date" id="setup-dob">
        <button onclick="Sys.finalize()" style="width:100%;padding:10px;background:none;border:1px solid var(--a);color:var(--a);margin-top:10px">INICIALIZAR</button>
    </div>
</div>

<div class="container">
    <div id="tab-status">
        <div class="panel" style="text-align:center">
            <span class="day-ui" id="day-ui" onclick="Sys.editDay()">DIA 1</span>
            <div id="p-arch" style="font-size:8px;color:var(--a);letter-spacing:2px">--</div>
            <div id="p-name" style="font-size:18px;font-weight:900;margin-bottom:10px">--</div>
            <div style="display:grid;grid-template-columns:1fr 1fr">
                <div style="text-align:left"><span class="stat-label">Rank</span><span class="stat-val" id="rank-ui" style="color:var(--a)">E</span></div>
                <div style="text-align:right"><span class="stat-label">Level</span><span class="stat-val" id="lvl-ui">00</span></div>
            </div>
            <div class="bar-w"><div id="rank-bar" class="bar-f"></div></div>
            <div style="margin-top:10px;text-align:left">
                <span class="stat-label">Potencial Genético: <span id="testo-val" onclick="Sys.edSt('testo')">300</span></span>
                <div class="bar-w"><div id="testo-bar" class="bar-f"></div></div>
            </div>
            <div style="margin-top:15px; border-top: 1px solid var(--b); padding-top: 10px;">
                <span class="stat-label">Hidratação: <span id="water-val" style="color:var(--a)">0</span>/3000ml</span>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button class="water-btn" onclick="Sys.addWater(300)">+ 300ML</button>
                    <button class="water-btn" onclick="Sys.addWater(500)">+ 500ML</button>
                </div>
            </div>
        </div>
        <div class="trinity-grid">
            <div class="trinity-card"><span class="stat-label">Corpo</span><b id="v-corpo" onclick="Sys.edSt('corpo')">10</b></div>
            <div class="trinity-card"><span class="stat-label">Mente</span><b id="v-mente" onclick="Sys.edSt('mente')">10</b></div>
            <div class="trinity-card"><span class="stat-label">Espírito</span><b id="v-espirito" onclick="Sys.edSt('espirito')">10</b></div>
        </div>
        <div id="mission-ui"></div>
        <button class="btn-reroll" onclick="Sys.rerollMiss()">⟳ TROCAR MISSÕES (-100 XP)</button>
    </div>

    <div id="tab-sys" class="hidden">
        <div class="panel" style="text-align:center">
            <span class="stat-label">Timer de Combate</span>
            <div class="timer-display" id="t-disp">00:00</div>
            <input type="number" id="t-min" class="timer-in" placeholder="M" min="0" value="0">
            <input type="number" id="t-sec" class="timer-in" placeholder="S" min="0" max="59" value="0">
            <div style="margin-top:10px">
                <button class="timer-btn" onclick="Sys.startT()">START</button>
                <button class="timer-btn" onclick="Sys.stopT()">STOP</button>
                <button class="timer-btn" onclick="Sys.resetT()">RESET</button>
            </div>
        </div>
        <div class="panel">
            <span class="stat-label">Skills Ativas</span>
            <div id="sk-list" style="margin:10px 0"></div>
            <div style="display:flex;gap:5px"><input type="text" id="sk-in" placeholder="Nova Skill..."><button onclick="Sys.addSk()" style="background:none;border:1px solid var(--a);color:var(--a);padding:0 10px">ADD</button></div>
        </div>
        <div class="panel">
            <div style="display:flex;gap:5px;margin-bottom:10px"><div class="w-tab active" id="t-PUXADA" onclick="Sys.swW('PUXADA')">PUXADA</div><div class="w-tab" id="t-EMPURRADA" onclick="Sys.swW('EMPURRADA')">EMPURRADA</div></div>
            <table class="w-table"><tbody id="w-list"></tbody></table>
        </div>
        <button onclick="Sys.reset()" style="width:100%;background:none;border:none;color:#333;font-size:8px;margin-top:15px">[ FORMATAR SISTEMA ]</button>
    </div>
</div>

<div class="nav">
    <div class="nav-btn active" id="b1" onclick="Sys.swT(1)">Status</div>
    <div class="nav-btn" id="b2" onclick="Sys.swT(2)">Painel</div>
</div>

<script>
const POOLS = {
    CALI: {
        "E": ["10-30 Flexões", "8-20 Barra Fixa", "5-15 Dips"],
        "D": ["8-20 Flexões Pseudo", "15-30s Tuck Front Lever", "30s-1min L-Sit"],
        "C": ["Frog p/ Crow", "Wall Handstand", "15-30s Adv. Tuck Front Lever"],
        "B": ["Tuck Planche", "One Leg Front", "Handstand"],
        "A": ["Straddle Front", "V-Sit", "HSPU"],
        "S": ["Front Lever", "Full Planche", "Maltese"]
    },
    TESTO: ["Jejum de dopamina fácil", "7 a 8h de sono", "15 minutos de sol", "Treino de perna", "Treino de resistência", "Comer sua esposa"],
    MENTE: ["Deep Work 90min", "Ler 20-40 páginas", "Estudar 1 skill 60min + praticar 30min", "Planejar o dia (3 tarefas principais)", "Escrever 1 pág. reflexão vida atual", "Assistir conteúdo útil + 5 aprendizados"],
    ESPIRITO: ["Ler a Bíblia + aplicar 1 ensinamento", "Orar por 5-10min", "Praticar gratidão (5 coisas reais)", "Ajudar alguém sem esperar retorno", "10 minutos de meditação"]
};

const Sys = {
    db: null, key: 'monarch_shadow_system', curW: 'PUXADA', timer: null, timeLeft: 0,
    init() {
        let d = localStorage.getItem(this.key);
        if (d) { this.db = JSON.parse(d); this.check(); this.render(); }
        else document.getElementById('setup-screen').classList.remove('hidden');
    },
    save(){ localStorage.setItem(this.key, JSON.stringify(this.db)); },
    selArch(a, e) { this.tA = a; document.querySelectorAll('.arch-opt').forEach(o => o.classList.remove('selected')); e.classList.add('selected'); },
    finalize() {
        let n = document.getElementById('setup-name').value, b = document.getElementById('setup-dob').value;
        if (!n || !b || !this.tA) return;
        this.db = { name: n.toUpperCase(), dob: b, arch: this.tA, xp: 0, testo: 300, water: 0, start: new Date().toISOString(), last: '',
                    attr: { C: 10, M: 10, E: 10 }, miss: [], lastMiss: [], skills: [], 
                    work: { PUXADA: Array(5).fill().map(()=>({n:'',s:'',r:'',d:false})), EMPURRADA: Array(5).fill().map(()=>({n:'',s:'',r:'',d:false})) } };
        this.genMiss(); this.save(); location.reload();
    },
    check() {
        let today = new Date().toLocaleDateString();
        if (this.db.last !== today && this.db.last !== '') {
            let falhas = this.db.miss.filter(m => !m.done).length;
            if (falhas > 0) {
                // LÓGICA DE PUNIÇÃO AGRESSIVA v5.4
                let totalPenalidade = falhas * 200; // Dobro da punição anterior
                let xpAntigo = this.db.xp;
                
                this.db.xp = Math.max(0, this.db.xp - totalPenalidade);
                this.db.testo = Math.max(0, this.db.testo - (falhas * 50));
                this.db.attr.M = Math.max(0, this.db.attr.M - falhas);
                this.db.attr.E = Math.max(0, this.db.attr.E - falhas);
                
                this.showAlert(`COLAPSO: -${totalPenalidade} XP | EROSÃO DE ATRIBUTOS!`);
                if (this.getRank(xpAntigo) !== this.getRank(this.db.xp)) this.showAlert("RANK PERDIDO!");
            }
            this.db.lastMiss = this.db.miss.map(m => m.task);
            this.db.last = today; this.db.water = 0; this.genMiss();
            ['PUXADA', 'EMPURRADA'].forEach(k => this.db.work[k].forEach(ex => ex.d = false));
            this.save();
        } else if (this.db.last === '') { this.db.last = today; this.save(); }
    },
    getRank(val = null) {
        let x = (val !== null) ? val : this.db.xp;
        if(x>=45000) return "S"; if(x>=30000) return "A"; if(x>=15000) return "B"; if(x>=5000) return "C"; if(x>=1000) return "D"; return "E";
    },
    genMiss() {
        let r = this.getRank();
        let currentTasks = this.db.miss ? this.db.miss.map(m => m.task) : [];
        let ranks = ["E", "D", "C", "B", "A", "S"];
        let idx = ranks.indexOf(r);
        let corpoPool = [];
        for(let i=0; i<=idx; i++) { corpoPool = corpoPool.concat(POOLS.CALI[ranks[i]]); }
        this.db.miss = [
            {type:'CORPO', task: this.getU(corpoPool, currentTasks[0]), done:false},
            {type:'TESTO', task: this.getU(POOLS.TESTO, currentTasks[1]), done:false},
            {type:'MENTE', task: this.getU(POOLS.MENTE, currentTasks[2]), done:false},
            {type:'ESPIRITO', task: this.getU(POOLS.ESPIRITO, currentTasks[3]), done:false}
        ];
    },
    getU(p, current) {
        let available = p.filter(t => !this.db.lastMiss.includes(t) && t !== current);
        if (available.length === 0) available = p.filter(t => t !== current);
        return available[Math.floor(Math.random()*available.length)];
    },
    rerollMiss() {
        if(confirm("Trocar missões por -100 XP?")) {
            let xpAntigo = this.db.xp;
            this.db.xp = Math.max(0, this.db.xp - 100);
            if (this.getRank(xpAntigo) !== this.getRank(this.db.xp)) this.showAlert("RANK REBAIXADO!");
            this.genMiss(); this.save(); this.render();
            this.showAlert("RECALIBRAGEM REALIZADA (-100 XP)");
        }
    },
    addWater(ml) {
        let wasBelow = this.db.water < 3000;
        this.db.water += ml;
        if(wasBelow && this.db.water >= 3000) { this.db.xp += 5; this.showAlert("HIDRATAÇÃO OK (+5 XP)"); }
        this.save(); this.render();
    },
    doMiss(i) {
        let m = this.db.miss[i]; m.done = true; this.db.xp += 25;
        if(m.type==='CORPO') this.db.attr.C+=2; if(m.type==='TESTO') this.db.testo+=30;
        if(m.type==='MENTE') this.db.attr.M+=2; if(m.type==='ESPIRITO') this.db.attr.E+=2;
        this.save(); this.render();
    },
    // Timer e Funções de UI
    startT() {
        if (this.timer) clearInterval(this.timer);
        if (this.timeLeft <= 0) {
            let m = parseInt(document.getElementById('t-min').value) || 0;
            let s = parseInt(document.getElementById('t-sec').value) || 0;
            this.timeLeft = (m * 60) + s;
        }
        if (this.timeLeft <= 0) return;
        this.timer = setInterval(() => {
            this.timeLeft--; this.updateTDisp();
            if (this.timeLeft <= 0) { clearInterval(this.timer); this.timer = null; this.beep(); this.showAlert("TEMPO ESGOTADO!"); }
        }, 1000);
    },
    stopT() { clearInterval(this.timer); this.timer = null; },
    resetT() { this.stopT(); this.timeLeft = 0; this.updateTDisp(); },
    updateTDisp() {
        let m = Math.floor(this.timeLeft / 60); let s = this.timeLeft % 60;
        document.getElementById('t-disp').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    },
    beep() {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator(); let gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = "sine"; osc.frequency.value = 880;
        osc.start(); setTimeout(() => osc.stop(), 500);
    },
    edSt(s) {
        let v = prompt("Novo Valor:", s==='testo'?this.db.testo:this.db.attr[s.charAt(0).toUpperCase()]);
        if(v) { if(s==='testo') this.db.testo=parseInt(v); else this.db.attr[s.charAt(0).toUpperCase()]=parseInt(v); this.save(); this.render(); }
    },
    editDay() {
        let v = prompt("Definir Dia:", 1);
        if(v) { let d=new Date(); d.setDate(d.getDate()-(parseInt(v)-1)); this.db.start=d.toISOString(); this.save(); this.render(); }
    },
    swW(t) { this.curW = t; this.renderW(); },
    swT(t) {
        document.getElementById('tab-status').classList.toggle('hidden', t!==1);
        document.getElementById('tab-sys').classList.toggle('hidden', t!==2);
        document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active', i+1===t));
        if(t===2) { this.renderW(); this.renderSk(); }
    },
    renderW() {
        document.querySelectorAll('.w-tab').forEach(b=>b.classList.toggle('active', b.id==='t-'+this.curW));
        document.getElementById('w-list').innerHTML = this.db.work[this.curW].map((ex,i)=>`
        <tr>
            <td><input type="checkbox" ${ex.d?'checked':''} onchange="Sys.tkW(${i})"></td>
            <td><input type="text" value="${ex.n}" placeholder="..." onchange="Sys.upW(${i},'n',this.value)"></td>
            <td><input type="text" value="${ex.s}" placeholder="S" style="width:25px" onchange="Sys.upW(${i},'s',this.value)"></td>
            <td><input type="text" value="${ex.r}" placeholder="R" style="width:25px" onchange="Sys.upW(${i},'r',this.value)"></td>
        </tr>`).join('');
    },
    tkW(i){ 
        let wasDone = this.db.work[this.curW][i].d;
        this.db.work[this.curW][i].d=!wasDone; 
        this.db.xp += wasDone ? -4 : 4; 
        this.save(); this.render(); 
    },
    upW(i,f,v){ this.db.work[this.curW][i][f]=v; this.save(); },
    addSk(){ let i=document.getElementById('sk-in'); if(i.value){this.db.skills.push(i.value); i.value=''; this.save(); this.renderSk();}},
    renderSk(){ document.getElementById('sk-list').innerHTML=this.db.skills.map(s=>`<span style="background:#111;padding:4px;font-size:10px;margin:2px;border:1px solid var(--b)">${s}</span>`).join(' ');},
    showAlert(msg){ let a=document.getElementById('alert-box'); a.innerText=msg; a.style.display='block'; setTimeout(() => a.style.display='none', 3000);},
    reset(){ if(confirm("Apagar tudo?")) {localStorage.removeItem(this.key); location.reload();}},
    render() {
        if(!this.db) return;
        let day = Math.floor((new Date()-new Date(this.db.start))/86400000)+1;
        document.getElementById('day-ui').innerText = "DIA "+day;
        document.getElementById('p-name').innerText = this.db.name;
        document.getElementById('p-arch').innerText = this.db.arch.toUpperCase();
        document.getElementById('lvl-ui').innerText = new Date().getFullYear()-new Date(this.db.dob).getFullYear();
        let r=this.getRank(), xP=0, nxt=1000, lvls={E:0,D:1000,C:5000,B:15000,A:30000,S:45000,MAX:100000};
        xP=lvls[r]; nxt=lvls[Object.keys(lvls)[Object.keys(lvls).indexOf(r)+1]];
        document.getElementById('rank-ui').innerText=r;
        document.getElementById('rank-bar').style.width=((this.db.xp-xP)/(nxt-xP)*100)+"%";
        document.getElementById('testo-val').innerText=this.db.testo;
        document.getElementById('testo-bar').style.width=Math.min(100,(this.db.testo/1200)*100)+"%";
        document.getElementById('water-val').innerText=this.db.water;
        document.getElementById('v-corpo').innerText=this.db.attr.C;
        document.getElementById('v-mente').innerText=this.db.attr.M;
        document.getElementById('v-espirito').innerText=this.db.attr.E;
        document.getElementById('mission-ui').innerHTML = this.db.miss.map((m,i)=>`
        <div class="mission-item ${m.done?'done':''}" onclick="Sys.doMiss(${i})">
            <span class="m-type">${m.type} QUEST</span><b>${m.task}</b>
        </div>`).join('');
    }
};
window.onload = () => Sys.init();
</script>
</body>
</html>
